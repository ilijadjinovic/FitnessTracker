<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
  <meta name="theme-color" content="#0f172a"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <base href="./">
  <link rel="manifest" href="./manifest.json"/>
  <title>Fitness Tracker</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div id="app">
  <div class="cnt" id="cnt">
    <div class="scr on" id="s-home"></div>
    <div class="scr" id="s-sched"></div>
    <div class="scr" id="s-hist"></div>
    <div class="scr" id="s-stats"></div>
    <div class="scr" id="s-nutr"></div>
    <div class="scr" id="s-prof"></div>
  </div>
  <nav class="nav">
    <button class="ni on" data-t="home" onclick="go('home')"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Početna</button>
    <button class="ni" data-t="sched" onclick="go('sched')"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Raspored</button>
    <button class="ni" data-t="hist" onclick="go('hist')"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Istorija</button>
    <button class="ni" data-t="stats" onclick="go('stats')"><svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Statistika</button>
    <button class="ni" data-t="nutr" onclick="go('nutr')"><svg viewBox="0 0 24 24"><path d="M18 8h1a4 4 0 010 8h-1"/><path d="M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>Ishrana</button>
    <button class="ni" data-t="prof" onclick="go('prof')"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Profil</button>
  </nav>
  <div class="modwrap hide" id="modwrap"><div class="mod" id="mod"></div></div>
  <div class="toast" id="toast"></div>
  <div class="rmodwrap hide" id="rmodwrap">
    <div class="rmod">
      <div class="rmhnd"></div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px">
        <span style="font-weight:700;font-size:17px">📄 Generiši izveštaj</span>
        <button onclick="closeRModal()" style="background:none;border:none;color:var(--tx2);font-size:24px;cursor:pointer;line-height:1;width:auto;padding:0">×</button>
      </div>
      <div class="clbl" style="margin-bottom:10px">Vremenski period</div>
      <div class="period-row" id="rperiod-row">
        <button class="period-btn on" data-p="7" onclick="selPeriod(this)">7 dana</button>
        <button class="period-btn" data-p="30" onclick="selPeriod(this)">30 dana</button>
        <button class="period-btn" data-p="90" onclick="selPeriod(this)">90 dana</button>
        <button class="period-btn" data-p="all" onclick="selPeriod(this)">Sve</button>
      </div>
      <div class="clbl" style="margin-bottom:10px">Sadržaj izveštaja</div>
      <div id="rtab-sched" class="rchk" onclick="togRTab('sched')">
        <div class="rchk-box"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><polyline points="2,6 5,9 10,3" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <span class="rchk-ico">📅</span><span class="rchk-lbl">Raspored treninga</span>
      </div>
      <div id="rtab-hist" class="rchk sel" onclick="togRTab('hist')">
        <div class="rchk-box"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><polyline points="2,6 5,9 10,3" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <span class="rchk-ico">🕐</span><span class="rchk-lbl">Istorija treninga</span>
      </div>
      <div id="rtab-stats" class="rchk sel" onclick="togRTab('stats')">
        <div class="rchk-box"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><polyline points="2,6 5,9 10,3" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <span class="rchk-ico">📊</span><span class="rchk-lbl">Statistika (trening + ishrana)</span>
      </div>
      <div id="rtab-nutr" class="rchk" onclick="togRTab('nutr')">
        <div class="rchk-box"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><polyline points="2,6 5,9 10,3" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <span class="rchk-ico">🥗</span><span class="rchk-lbl">Ishrana (dnevni dnevnik)</span>
      </div>
      <button class="btn btp" style="margin-top:18px" onclick="genPdf()">📥 Generiši PDF</button>
    </div>
  </div>
</div>
<div id="pdfContent"></div>

<!-- Biblioteke -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

<!-- Podaci (redosled je važan: data → food → dex → firebase → app) -->
<script src="data.js"></script>
<script src="food.js"></script>
<script src="dex.js"></script>
<script type="module" src="firebase.js"></script>
<script src="app.js"></script>
</body>
</html>
